<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Trabajo Práctico 4 A-Frame- Marquez - Togachinky</title>

    <script src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>
    <script src="https://unpkg.com/@c-frame/aframe-physics-system@4.2.3/dist/aframe-physics-system.min.js"></script>

    <<style>
body {
    margin: 0;
    overflow: hidden;
    background-image: url('https://img.magnific.com/fotos-premium/bandera-humo-argentina-sobre-fondo-negro-bandera-argentina_559531-35451.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}
</style>
</head>

<body>

    <!-- Logo -->
    <img class="logo"
        src="https://www.frre.utn.edu.ar/static/img/LOGO.png"
        width="160"
        height="100">

    <a-scene physics>

        <!-- Recursos -->
        <a-assets>

            <audio id="musica"
                src="https://raw.githubusercontent.com/togachinky/Trabajo-Pr-ctico-Nro-4-a-frame/main/11.mp3">
            </audio>

        </a-assets>

        <!-- Audio -->
        <a-entity
            sound="src: #musica;
                   autoplay: true;
                   loop: true;
                   volume: 3">
        </a-entity>

        <!-- Luces -->
        <a-light type="ambient" intensity="1.2"></a-light>

        <a-light
            type="directional"
            position="2 8 4"
            intensity="1.5">
        </a-light>

        <!-- Piso -->
        <a-plane
            position="0 0 -3"
            rotation="-90 0 0"
            width="15"
            height="15"
            color="#FCBF49"
            static-body>
        </a-plane>

        <!-- Cajas -->
        <a-box
            position="-2 4 -3"
            rotation="0 45 0"
            color="#FFFFFF"
            dynamic-body>
        </a-box>

        <a-box
            position="-5 4 -5"
            rotation="0 45 0"
            color="#6CACE4"
            dynamic-body>
        </a-box>

        <a-box
            position="2 4 -3"
            rotation="0 45 0"
            color="#6CACE4"
            dynamic-body>
        </a-box>

        <a-box
            position="5 4 -5"
            rotation="0 45 0"
            color="#FFFFFF"
            dynamic-body>
        </a-box>

        <!-- Panel Profesor -->
        <a-plane
            position="-0.4 6 -7.9"
            width="14"
            height="1.5"
            color="#FFFFFF">
        </a-plane>

        <a-text
            value="Profesor/a: Marquez Camila Araceli - Togachinky Daniel Abraham"
            position="-6.3 6 -7.8"
            color="#0000FF"
            width="13"
            align="left">
        </a-text>

        <!-- Panel Tutora -->
        <a-plane
            position="0 4 -7.9"
            width="8"
            height="1.5"
            color="#FFFFFF">
        </a-plane>

        <a-text
            value="Tutora: Liliana Ocampo"
            position="-2.8 4 -7.8"
            color="#FF0000"
            width="10">
        </a-text>

        <!-- Panel UTN -->
        <a-plane
            position="0 2 -8"
            width="8"
            height="0.9"
            color="#FFFFFF">
        </a-plane>

        <a-text
            value="U.T.N. Facultad Regional Resistencia"
            position="-3.8 2 -7.9"
            color="#008000"
            width="10">
        </a-text>

        <!-- Panel Ciclo Lectivo -->
        <a-plane
            position="-0.5 0.8 -8"
            width="5"
            height="0.9"
            color="#FFFFFF">
        </a-plane>

        <a-text
            value="CICLO LECTIVO 2026"
            position="-2.2 0.8 -7.9"
            color="#800080"
            width="8">
        </a-text>

        <!-- Modelo Pelotas -->
        <a-gltf-model
            src="https://raw.githubusercontent.com/togachinky/Trabajo-Pr-ctico-Nro-4-a-frame/main/pelotas.glb"
            position="3 0.5 -7"
            scale="1 1 1">
        </a-gltf-model>

        <!-- Modelo Messi -->
        <a-gltf-model
            src="https://raw.githubusercontent.com/togachinky/Trabajo-Pr-ctico-Nro-4-a-frame/main/messi.glb"
            position="-4 2 -6"
            rotation="0 30 0"
            scale="2 2 2">
        </a-gltf-model>

        <!-- Cámara -->
        <a-entity
            position="0 0 0"
            camera
            wasd-controls
            look-controls>
        </a-entity>

        <!-- Cielo -->
        

    </a-scene>

</body>

</html>
